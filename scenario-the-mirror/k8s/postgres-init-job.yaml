# Job to initialize PostgreSQL schema (Phase 3)
# Runs once to create tables, indexes, views

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-schema
  namespace: cyber-riposte
data:
  schema.sql: |
    -- PostgreSQL schema for The Mirror audit log
    -- Loaded from db/schema.sql

    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    CREATE TABLE IF NOT EXISTS audit_log (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        incident_id VARCHAR(64) NOT NULL,
        timestamp TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        action_id VARCHAR(128) NOT NULL,
        action_name VARCHAR(256) NOT NULL,
        action_tier INTEGER,
        action_result VARCHAR(64) NOT NULL,
        parameters JSONB,
        rollback_handle VARCHAR(256),
        expires_at TIMESTAMPTZ,
        detection_confidence DECIMAL(3,2),
        detection_method VARCHAR(64),
        evidence_refs JSONB,
        playbook_rule VARCHAR(128),
        reasoning TEXT,
        context JSONB,
        llm_consulted BOOLEAN DEFAULT FALSE,
        llm_model JSONB,
        llm_reasoning TEXT,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_audit_incident_id ON audit_log(incident_id);
    CREATE INDEX IF NOT EXISTS idx_audit_timestamp ON audit_log(timestamp DESC);
    CREATE INDEX IF NOT EXISTS idx_audit_action_id ON audit_log(action_id);
    CREATE INDEX IF NOT EXISTS idx_audit_created_at ON audit_log(created_at DESC);
    CREATE INDEX IF NOT EXISTS idx_audit_action_result ON audit_log(action_result);
    CREATE INDEX IF NOT EXISTS idx_audit_parameters ON audit_log USING GIN (parameters);
    CREATE INDEX IF NOT EXISTS idx_audit_context ON audit_log USING GIN (context);

    CREATE TABLE IF NOT EXISTS incidents (
        incident_id VARCHAR(64) PRIMARY KEY,
        first_seen TIMESTAMPTZ NOT NULL,
        last_updated TIMESTAMPTZ NOT NULL,
        attacker_ip INET NOT NULL,
        attacker_info JSONB,
        detection_signature TEXT,
        detection_confidence DECIMAL(3,2),
        detection_signals JSONB,
        actions_count INTEGER DEFAULT 0,
        actions_summary JSONB,
        status VARCHAR(32) DEFAULT 'active',
        severity INTEGER,
        postmortem_generated BOOLEAN DEFAULT FALSE,
        postmortem_reviewed BOOLEAN DEFAULT FALSE,
        reviewed_by VARCHAR(128),
        reviewed_at TIMESTAMPTZ,
        github_issue_url TEXT,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_incidents_attacker_ip ON incidents(attacker_ip);
    CREATE INDEX IF NOT EXISTS idx_incidents_first_seen ON incidents(first_seen DESC);
    CREATE INDEX IF NOT EXISTS idx_incidents_status ON incidents(status);
    CREATE INDEX IF NOT EXISTS idx_incidents_severity ON incidents(severity);
    CREATE INDEX IF NOT EXISTS idx_incidents_postmortem ON incidents(postmortem_generated);

    CREATE TABLE IF NOT EXISTS evidence (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        incident_id VARCHAR(64) NOT NULL REFERENCES incidents(incident_id) ON DELETE CASCADE,
        evidence_type VARCHAR(64) NOT NULL,
        file_path TEXT,
        file_size BIGINT,
        data JSONB,
        collected_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_evidence_incident_id ON evidence(incident_id);
    CREATE INDEX IF NOT EXISTS idx_evidence_type ON evidence(evidence_type);
    CREATE INDEX IF NOT EXISTS idx_evidence_collected_at ON evidence(collected_at DESC);

    CREATE TABLE IF NOT EXISTS virtualservices (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        incident_id VARCHAR(64) NOT NULL REFERENCES incidents(incident_id) ON DELETE CASCADE,
        vs_name VARCHAR(128) NOT NULL,
        vs_namespace VARCHAR(128) NOT NULL,
        attacker_ip INET NOT NULL,
        honeypot_destination TEXT NOT NULL,
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        expires_at TIMESTAMPTZ NOT NULL,
        deleted_at TIMESTAMPTZ,
        status VARCHAR(32) DEFAULT 'active'
    );

    CREATE INDEX IF NOT EXISTS idx_vs_incident_id ON virtualservices(incident_id);
    CREATE INDEX IF NOT EXISTS idx_vs_attacker_ip ON virtualservices(attacker_ip);
    CREATE INDEX IF NOT EXISTS idx_vs_status ON virtualservices(status);
    CREATE INDEX IF NOT EXISTS idx_vs_expires_at ON virtualservices(expires_at);

    CREATE TABLE IF NOT EXISTS metrics (
        id BIGSERIAL PRIMARY KEY,
        metric_name VARCHAR(128) NOT NULL,
        metric_value DECIMAL(10,2) NOT NULL,
        tags JSONB,
        timestamp TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_metrics_name_timestamp ON metrics(metric_name, timestamp DESC);

    CREATE OR REPLACE VIEW recent_incidents AS
    SELECT
        i.incident_id,
        i.attacker_ip,
        i.first_seen,
        i.detection_signature,
        i.detection_confidence,
        i.actions_count,
        i.status,
        i.severity,
        COUNT(a.id) as audit_entries
    FROM incidents i
    LEFT JOIN audit_log a ON i.incident_id = a.incident_id
    WHERE i.first_seen >= NOW() - INTERVAL '7 days'
    GROUP BY i.incident_id, i.attacker_ip, i.first_seen,
             i.detection_signature, i.detection_confidence,
             i.actions_count, i.status, i.severity
    ORDER BY i.first_seen DESC;

    CREATE OR REPLACE VIEW action_stats AS
    SELECT
        action_id,
        action_name,
        action_result,
        COUNT(*) as count,
        MIN(timestamp) as first_used,
        MAX(timestamp) as last_used
    FROM audit_log
    GROUP BY action_id, action_name, action_result
    ORDER BY count DESC;

    CREATE OR REPLACE VIEW llm_stats AS
    SELECT
        DATE(timestamp) as date,
        detection_method,
        COUNT(*) as total_detections,
        SUM(CASE WHEN llm_consulted THEN 1 ELSE 0 END) as llm_consultations,
        AVG(detection_confidence) as avg_confidence
    FROM audit_log
    WHERE action_id LIKE '%detect%' OR detection_method IS NOT NULL
    GROUP BY DATE(timestamp), detection_method
    ORDER BY date DESC;

    COMMENT ON TABLE audit_log IS 'Complete audit trail of all agent actions';
    COMMENT ON TABLE incidents IS 'Summary of security incidents detected by The Mirror';
    COMMENT ON TABLE evidence IS 'Evidence files and OSINT data for incidents';
    COMMENT ON TABLE virtualservices IS 'Istio VirtualServices created for traffic redirection';
    COMMENT ON TABLE metrics IS 'Time-series metrics for monitoring and dashboards';

---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init-schema
  namespace: cyber-riposte
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: psql
        image: registry.redhat.io/rhel9/postgresql-15:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h postgres -U $PGUSER -d $PGDATABASE; do
            echo "Waiting..."
            sleep 2
          done
          echo "PostgreSQL is ready. Initializing schema..."
          psql -h postgres -U $PGUSER -d $PGDATABASE -f /schema/schema.sql
          echo "Schema initialization complete!"
        env:
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_USER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_DB

        volumeMounts:
        - name: schema
          mountPath: /schema
          readOnly: true

      volumes:
      - name: schema
        configMap:
          name: postgres-schema
