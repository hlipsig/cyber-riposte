# Example deployment with Claude API LLM backend
# This is a variant of agent-deployment.yaml with LLM configuration

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirror-agent-llm
  namespace: cyber-riposte
  labels:
    app: mirror-agent
    llm: claude
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mirror-agent
      llm: claude
  template:
    metadata:
      labels:
        app: mirror-agent
        llm: claude
    spec:
      serviceAccountName: mirror-agent
      containers:
      - name: mirror-agent
        image: quay.io/your-org/mirror-agent:llm-latest
        imagePullPolicy: Always
        ports:
        - name: health
          containerPort: 8080
        env:
        # Event source
        - name: EVENT_SOURCE
          value: "stdin"  # or "kafka"

        # LLM Configuration - Claude API
        - name: LLM_BACKEND
          value: "hybrid"  # Options: rules, claude, huggingface, hybrid, auto
        - name: CLAUDE_MODEL
          value: "claude-sonnet-4-6"  # Fast, cost-effective for per-event decisions

        # Claude API Key from Secret
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: mirror-agent-secrets
              key: ANTHROPIC_API_KEY

        # Other configuration
        - name: HONEYPOT_IP
          value: "honeypot-service.cyber-riposte.svc.cluster.local"
        - name: ACTION_POOL_PATH
          value: "/etc/mirror/config/action-pool.yaml"
        - name: USER_AGENTS_PATH
          value: "/etc/mirror/config/suspicious-user-agents.yaml"
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_FORMAT
          value: "json"
        - name: HEALTH_PORT
          value: "8080"

        # OSINT API keys
        - name: SHODAN_API_KEY
          valueFrom:
            secretKeyRef:
              name: mirror-agent-secrets
              key: SHODAN_API_KEY
              optional: true

        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 5

        resources:
          requests:
            memory: "512Mi"  # Higher for LLM processing
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"

        volumeMounts:
        - name: config
          mountPath: /etc/mirror/config
          readOnly: true
        - name: audit-logs
          mountPath: /var/log/cyber-riposte

        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL

      volumes:
      - name: config
        configMap:
          name: mirror-agent-config
      - name: audit-logs
        persistentVolumeClaim:
          claimName: mirror-agent-audit-pvc

      restartPolicy: Always
