# Istio Control Plane (Phase 4)
# Deploys istiod and ingress gateway

apiVersion: v1
kind: Namespace
metadata:
  name: istio-system

---
apiVersion: install.istio.io/v1alpha1
kind: IstioOperator
metadata:
  name: mirror-istio
  namespace: istio-system
spec:
  profile: default

  # Components
  components:
    # Istiod (control plane)
    pilot:
      enabled: true
      k8s:
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        hpaSpec:
          minReplicas: 1
          maxReplicas: 3

    # Ingress Gateway (entry point for traffic)
    ingressGateways:
    - name: istio-ingressgateway
      enabled: true
      k8s:
        service:
          type: LoadBalancer  # Use LoadBalancer for cloud, NodePort for local
          ports:
          - port: 80
            targetPort: 8080
            name: http
          - port: 443
            targetPort: 8443
            name: https
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        hpaSpec:
          minReplicas: 1
          maxReplicas: 5

    # Egress Gateway (not needed for Mirror)
    egressGateways:
    - name: istio-egressgateway
      enabled: false

  # Mesh configuration
  meshConfig:
    # Access logging
    accessLogFile: /dev/stdout
    accessLogEncoding: JSON

    # Tracing (Phase 7)
    enableTracing: true
    defaultConfig:
      tracing:
        sampling: 10.0  # 10% sampling

    # Telemetry
    enablePrometheusMerge: true

  # Values
  values:
    global:
      # Proxy settings for all sidecars
      proxy:
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

      # Enable automatic sidecar injection
      istiod:
        enableAnalysis: true

    # Pilot (istiod) settings
    pilot:
      autoscaleEnabled: true
      autoscaleMin: 1
      autoscaleMax: 3

    # Gateway settings
    gateways:
      istio-ingressgateway:
        autoscaleEnabled: true
        autoscaleMin: 1
        autoscaleMax: 5
