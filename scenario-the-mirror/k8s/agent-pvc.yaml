apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mirror-agent-audit-pvc
  namespace: cyber-riposte
  labels:
    app: mirror-agent
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  # Use appropriate storage class for your OpenShift cluster
  # Example storage classes: gp2, gp3, ocs-storagecluster-ceph-rbd, nfs, managed-csi
  storageClassName: managed-csi  # Azure Disk CSI (default for ARO)
