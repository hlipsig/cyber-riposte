# Secret template for Mirror agent credentials
# Phase 3: Includes DATABASE_URL for PostgreSQL connection
#
# To create from this template:
#   1. Copy this file: cp agent-secret-template.yaml agent-secret.yaml
#   2. Fill in actual values (not base64 - kubectl handles encoding)
#   3. Apply: oc apply -f agent-secret.yaml
#   4. Add agent-secret.yaml to .gitignore (DO NOT COMMIT SECRETS)

apiVersion: v1
kind: Secret
metadata:
  name: mirror-agent-secrets
  namespace: cyber-riposte
type: Opaque
stringData:
  # Phase 3: PostgreSQL connection string
  # Format: postgresql://user:password@host:port/database
  DATABASE_URL: "postgresql://mirror_agent:changeme@postgres:5432/mirror_audit"

  # OSINT API keys (optional)
  SHODAN_API_KEY: ""

  # LLM API keys (optional - only if using LLM backends)
  ANTHROPIC_API_KEY: ""
  HF_API_TOKEN: ""

  # GitHub integration (Phase 8 - optional)
  GITHUB_TOKEN: ""

  # Slack integration (Phase 8 - optional)
  SLACK_WEBHOOK_URL: ""
