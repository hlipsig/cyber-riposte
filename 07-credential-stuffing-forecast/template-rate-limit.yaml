# Rate-limit template for targeted accounts during a stuffing campaign
# Applied to nginx or HAProxy via GitOps on merge

# nginx example: limit_req_zone per targeted account
rate_limit:
  zone_name: "stuffing_defense_{{ campaign_id }}"
  requests_per_minute: 3
  burst: 5
  action: reject  # 429 after burst exceeded

targeted_accounts:
  # {{ accounts_list }}

