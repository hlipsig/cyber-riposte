# Example network topology the agent would reason over.
# In practice this comes from a CMDB, cloud API, or network scanner.

hosts:
  prod-web-03:
    ip: 10.1.2.30
    subnet: 10.1.2.0/24
    ssh_keys: [deploy-key-web]
    trusts: [jenkins-01]
    db_access: [prod-db-01]
    nfs_mounts: [/shared/static]
    services: [nginx, app-server]

  prod-web-04:
    ip: 10.1.2.31
    subnet: 10.1.2.0/24
    ssh_keys: [deploy-key-web]
    services: [nginx, app-server]

  prod-db-01:
    ip: 10.1.3.10
    subnet: 10.1.3.0/24
    ssh_keys: [deploy-key-db]
    services: [postgresql]
    nfs_exports: []

  jenkins-01:
    ip: 10.1.4.5
    subnet: 10.1.4.0/24
    ssh_keys: [deploy-key-web, deploy-key-db, jenkins-master]
    services: [jenkins]

  nfs-01:
    ip: 10.1.3.50
    subnet: 10.1.3.0/24
    nfs_exports: [/shared/static, /shared/logs]
    services: [nfsd]
