# Auto-generated by cyber-riposte agent
# Trigger: {{ trigger_reason }}
# Pod:     {{ pod_name }} in namespace {{ namespace }}

# Step 1: Allow only the expected traffic path (frontend → api)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-{{ app_label }}-ingress
  namespace: {{ namespace }}
  labels:
    managed-by: cyber-riposte
    incident: "{{ incident_id }}"
spec:
  podSelector:
    matchLabels:
      app: {{ app_label }}
  policyTypes:
    - Egress
  egress:
    # Only allow traffic to the API service
    - to:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 8080
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
