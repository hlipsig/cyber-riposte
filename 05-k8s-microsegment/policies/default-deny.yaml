# Baseline: deny all ingress and egress unless explicitly allowed.
# The agent proposes this first if no default-deny exists in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: production
  labels:
    managed-by: cyber-riposte
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
