# Auto-generated by cyber-riposte agent
# Trigger: {{ trigger_reason }}
# Blocks unauthorized external egress from namespace {{ namespace }}

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: restrict-external-egress
  namespace: {{ namespace }}
  labels:
    managed-by: cyber-riposte
    incident: "{{ incident_id }}"
spec:
  podSelector:
    matchLabels:
      app: {{ app_label }}
  policyTypes:
    - Egress
  egress:
    # Allow cluster-internal traffic only
    - to:
        - podSelector: {}
    # Allow DNS
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
    # Explicitly deny all external egress by omitting any
    # ipBlock rules — only the above in-cluster targets are allowed
